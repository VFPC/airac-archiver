# AIRAC Archiver configuration
# ---
# This file is committed to version control with safe default values.
# Create config.local.yaml (gitignored) to set your machine-specific paths
# without touching this file.

# Directory on your machine where per-cycle working directories live.
# Each cycle has a sub-directory named "vFPC YYNN" (e.g. "vFPC 2603").
# Set in config.local.yaml.
workspace_base: ""

# Path to your local clone of VFPC/airac-data.
# The archiver copies flat files and manifest here, then runs git add.
# Set in config.local.yaml.
archive_repo: ""

# Optional path to vFPC-Hub/data/local.
# When set, archive will also copy reproducibility/RAD/runtime diagnostic
# artifacts from {hub_data_root}/YYNN into airac-data under preserved
# subdirectories such as rad/, bundle/, routes/, and diagnostics/summaries/.
hub_data_root: ""
